services:
  backend:
    image: ghcr.io/chinh00/skipli-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5001}:5001"
    env_file:
      - ./backend/.env.production
    environment:
      NODE_ENV: production

  frontend:
    image: ghcr.io/chinh00/skipli-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
