name: Docker Publish

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: chinh00
  DEFAULT_VITE_API_URL: http://localhost:5001

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tags
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/skipli-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/skipli-backend:${{ steps.meta.outputs.short_sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || env.DEFAULT_VITE_API_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/skipli-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/skipli-frontend:${{ steps.meta.outputs.short_sha }}
